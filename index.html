<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarefas - CRUD Académico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-5">
      <h1>Minha Lista de Tarefas</h1>
      <div class="row mt-4">
        <div class="col-md-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title mb-3">Nova Tarefa</h5>
              <div class="form-group mb-3">
                <label for="campo-desc" class="mb-1">Descrição</label>
                <input type="text" class="form-control" id="campo-desc" placeholder="O que precisa ser feito?" />
              </div>
              <button type="button" class="btn btn-primary w-100">Adicionar</button>
            </div>
          </div>
        </div>
        <div class="col-md-8">
          <table class="table table-striped table-hover shadow-sm bg-white">
            <thead class="table-dark">
              <tr>
                <th scope="col">Descrição</th>
                <th scope="col" style="width: 200px;">Ações</th>
              </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script type="module" src="main.mjs"></script>
  </body>
</html>
